<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">The wordmark MONIES on a cream background, in a rounded bold typeface, where the letter O is replaced by a circular icon of three small coins in gold, teal, and coral linked by a teal rotation arrow, with the word PARI centered above the letters NIES, now set larger.</desc>
